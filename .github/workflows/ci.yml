name: ci 
on:
  push:
    branches:
      - master 
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 0은 모든 커밋 히스토리를 가져오라는 의미입니다 (날짜 추적에 필수)
          fetch-depth: 0
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt # 파일기반 설치
          
      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force

